<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">PII and compliance controls dashboard</title>
  <desc id="desc">AiRAT compliance dashboard with PII redaction metrics, review queues, and declining hallucination rates over quarters.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
