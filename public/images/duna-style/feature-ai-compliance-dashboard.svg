  <text x="360" y="188" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#c8f542">100%</text>
  <rect x="56" y="216" width="448" height="264" rx="10" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="244" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Hallucination rate by quarter</text>
