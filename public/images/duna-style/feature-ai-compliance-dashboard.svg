  <rect x="168" y="288" width="48" height="160" rx="4" fill="#b2afae"/>
  <rect x="240" y="312" width="48" height="136" rx="4" fill="#46838c" opacity="0.45"/>
  <rect x="312" y="336" width="48" height="112" rx="4" fill="#2dd4bf" opacity="0.5"/>
  <rect x="384" y="356" width="48" height="92" rx="4" fill="#c8f542" opacity="0.55"/>
  <text x="120" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Q1</text>
  <text x="192" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Q2</text>
  <text x="264" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Q3</text>
  <text x="336" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Q4</text>
  <text x="408" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Q5</text>
  <text x="400" y="248" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#46838c">-62%</text>
