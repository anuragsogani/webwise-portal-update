<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">RAG and retrieval boundaries word map</title>
  <desc id="desc">AiRAT circular word map of retrieval-augmented generation concepts including vectors, chunks, citations, and grounding boundaries.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="280" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">RAG and retrieval boundaries</text>
  <text x="280" y="92" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Grounded answers stay inside scoped knowledge</text>
  <circle cx="280" cy="300" r="168" fill="#46838c" opacity="0.12"/>
  <circle cx="280" cy="300" r="120" fill="#2dd4bf" opacity="0.18"/>
  <text x="280" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="#1a1a18">RAG</text>
  <text x="280" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#46838c">vectors</text>
  <text x="400" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1a1a18">embeddings</text>
  <text x="420" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">chunks</text>
  <text x="392" y="396" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#898683">index</text>
  <text x="280" y="432" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#46838c">citations</text>
  <text x="168" y="396" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1a1a18">grounding</text>
  <text x="148" y="308" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#1a1a18">boundaries</text>
  <text x="168" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#898683">tenancy</text>
  <text x="332" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#b2afae">audit</text>
  <text x="228" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#b2afae">review</text>
  <text x="56" y="522" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
