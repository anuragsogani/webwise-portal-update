<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Custom internal enterprise platforms</title>
  <desc id="desc">AiRAT diagram of RBAC workflows, web and mobile surfaces, and ERP integrations with audit trails.</desc>
