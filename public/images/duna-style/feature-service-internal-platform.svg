  <rect x="392" y="304" width="96" height="48" rx="8" fill="#fff" stroke="#e8e6e1"/>
  <text x="440" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">CRM</text>
