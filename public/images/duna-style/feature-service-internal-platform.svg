  <rect x="392" y="164" width="88" height="56" rx="6" fill="#f7f7f5" opacity="0.15"/>
  <text x="412" y="198" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#928e8b">mobile</text>
  <rect x="56" y="256" width="448" height="224" rx="10" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="284" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Integrations</text>
