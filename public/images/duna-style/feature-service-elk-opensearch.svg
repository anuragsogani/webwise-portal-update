<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">OpenSearch and ELK observability at scale</title>
  <desc id="desc">AiRAT diagram of sub-second cross-estate search with shard throughput and migration cutover readiness.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="56" y="72" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">Search and observability</text>
  <text x="56" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#898683">ELK / OpenSearch &#183; cross-estate queries</text>
  <rect x="56" y="120" width="120" height="48" rx="8" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="150" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#46838c">12ms</text>
  <rect x="192" y="120" width="120" height="48" rx="8" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="208" y="150" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#1a1a18">48</text>
  <text x="208" y="164" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#898683">shards</text>
  <rect x="328" y="120" width="176" height="48" rx="8" fill="#1a1a18"/>
  <text x="344" y="150" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#c8f542">Petabyte</text>
  <rect x="56" y="184" width="448" height="200" rx="10" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="212" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Query volume</text>
  <path d="M72 340 L128 300 L184 312 L240 260 L296 272 L352 220 L408 232 L464 200" stroke="#2dd4bf" stroke-width="3" fill="none"/>
  <path d="M72 356 L128 328 L184 336 L240 296 L296 304 L352 268" stroke="#46838c" stroke-width="2" fill="none" opacity="0.6"/>
  <rect x="56" y="400" width="216" height="96" rx="8" fill="#f3f2ef" stroke="#e8e6e1"/>
  <text x="72" y="428" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">Migration cutover</text>
  <rect x="72" y="440" width="176" height="8" rx="4" fill="#c8f542"/>
  <rect x="72" y="456" width="140" height="8" rx="4" fill="#2dd4bf" opacity="0.5"/>
  <rect x="288" y="400" width="216" height="96" rx="8" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="304" y="428" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">Relevance validated</text>
  <rect x="304" y="444" width="96" height="32" rx="6" fill="#46838c" opacity="0.25"/>
  <text x="56" y="522" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
