<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Attack path graph with risk score</title>
  <desc id="desc">Attack graph showing user, endpoint, identity, cloud resource, and database in a highlighted attack chain with risk score.</desc>
  <rect width="1200" height="675" fill="#f7f7f5"/>
  <rect x="24" y="24" width="1152" height="627" fill="#fff" stroke="#e8e6e1"/>
  <text x="56" y="72" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#1a1a18">Attack path analysis</text>
  <text x="56" y="96" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Correlated incident &#183; root cause surfaced</text>
  <rect x="920" y="48" width="200" height="52" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="940" y="70" font-family="ui-monospace, monospace" font-size="10" fill="#898683">RISK SCORE</text>
  <text x="940" y="90" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#1a1a18">92 / 100</text>
  <rect x="56" y="120" width="1088" height="480" fill="#fafaf8" stroke="#e8e6e1"/>
  <path d="M200 340 L360 280 L540 320 L720 300 L940 360" stroke="#e8e6e1" stroke-width="2" fill="none"/>
  <path d="M200 340 L360 280 L540 320 L720 300 L940 360" stroke="#46838c" stroke-width="2.5" fill="none"/>
  <path d="M360 280 L540 440" stroke="#e8e6e1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M540 320 L540 440" stroke="#e8e6e1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <g>
    <circle cx="200" cy="340" r="40" fill="#fff" stroke="#46838c" stroke-width="2"/>
    <text x="200" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">User</text>
    <text x="200" y="354" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#898683">compromised</text>
  </g>
  <g>
    <circle cx="360" cy="280" r="40" fill="#fff" stroke="#1a1a18" stroke-width="2"/>
    <text x="360" y="276" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Endpoint</text>
    <text x="360" y="294" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#898683">lateral move</text>
  </g>
  <g>
    <circle cx="540" cy="320" r="40" fill="#fff" stroke="#1a1a18" stroke-width="2"/>
    <text x="540" y="316" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Identity</text>
    <text x="540" y="334" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#898683">privilege</text>
  </g>
  <g>
    <circle cx="720" cy="300" r="40" fill="#fff" stroke="#46838c" stroke-width="2"/>
    <text x="720" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a18">Cloud</text>
    <text x="720" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a18">resource</text>
  </g>
  <g>
    <circle cx="940" cy="360" r="40" fill="#fff" stroke="#1a1a18" stroke-width="2"/>
    <text x="940" y="356" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Database</text>
    <text x="940" y="374" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#898683">exfiltration</text>
  </g>
  <g>
    <circle cx="540" cy="440" r="32" fill="#c8f542" opacity="0.45" stroke="#1a1a18"/>
    <text x="540" y="444" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#1a1a18">IOC</text>
  </g>
  <rect x="80" y="520" width="160" height="56" fill="#fff" stroke="#e8e6e1"/>
  <text x="96" y="542" font-family="ui-monospace, monospace" font-size="10" fill="#898683">ROOT CAUSE</text>
  <text x="96" y="562" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1a1a18">Stolen credentials</text>
  <text x="56" y="640" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
