<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">How enterprises use AI assistants</title>
  <desc id="desc">AiRAT treemap chart showing illustrative enterprise AI assistant use-case distribution across programming, writing, information lookup, education, and related tasks.</desc>
