<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">AIOps and platform observability</title>
  <desc id="desc">AiRAT diagram correlating logs, metrics, and traces into owner-context incidents with customer-journey SLOs.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="280" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">AIOps and observability</text>
  <text x="280" y="92" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Logs &#183; metrics &#183; traces correlated</text>
  <circle cx="160" cy="200" r="40" fill="#f3f2ef" stroke="#e8e6e1"/>
  <text x="160" y="196" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a18">logs</text>
  <circle cx="280" cy="200" r="40" fill="#2dd4bf" opacity="0.25" stroke="#46838c"/>
  <text x="280" y="196" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a18">metrics</text>
  <circle cx="400" cy="200" r="40" fill="#f3f2ef" stroke="#e8e6e1"/>
  <text x="400" y="196" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1a1a18">traces</text>
  <path d="M200 200h40M320 200h40" stroke="#46838c" stroke-width="2"/>
  <path d="M160 240 L280 300 L400 240" stroke="#c8f542" stroke-width="2" fill="none"/>
  <rect x="176" y="312" width="208" height="72" rx="10" fill="#1a1a18"/>
  <text x="280" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#c8f542">1 incident</text>
  <text x="280" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#928e8b">owner: payments squad</text>
  <rect x="56" y="408" width="192" height="72" rx="8" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="436" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Duplicate alerts</text>
  <text x="72" y="460" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#46838c">-73%</text>
  <rect x="264" y="408" width="240" height="72" rx="8" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="280" y="436" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">Customer-journey SLO</text>
  <rect x="280" y="448" width="200" height="8" rx="4" fill="#c8f542" opacity="0.6"/>
  <text x="56" y="522" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
