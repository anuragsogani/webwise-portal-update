<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">E-commerce catalog search at scale</title>
  <desc id="desc">AiRAT chart of catalog search latency, relevance scores, and checkout reliability under campaign traffic.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="56" y="72" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">E-commerce and marketplace search</text>
  <text x="56" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Catalog relevance &#183; campaign-ready checkout</text>
  <text x="400" y="140" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#46838c">0.35s</text>
  <text x="400" y="160" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">query latency</text>
  <text x="400" y="188" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#b2afae">was 4.2s</text>
  <rect x="56" y="120" width="320" height="200" rx="10" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="72" y="148" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Search relevance</text>
  <rect x="72" y="168" width="256" height="12" rx="6" fill="#2dd4bf" opacity="0.45"/>
  <rect x="72" y="192" width="220" height="12" rx="6" fill="#c8f542" opacity="0.55"/>
  <rect x="72" y="216" width="188" height="12" rx="6" fill="#46838c" opacity="0.35"/>
  <rect x="72" y="240" width="160" height="12" rx="6" fill="#dbd9cd"/>
  <text x="72" y="280" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#898683">5M products indexed &#183; faceted browse</text>
  <rect x="56" y="336" width="208" height="160" rx="10" fill="#1a1a18"/>
  <text x="72" y="364" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#c8f542">Checkout path</text>
  <rect x="72" y="380" width="176" height="10" rx="5" fill="#c8f542" opacity="0.7"/>
  <rect x="72" y="400" width="152" height="10" rx="5" fill="#2dd4bf" opacity="0.55"/>
  <rect x="72" y="420" width="128" height="10" rx="5" fill="#f7f7f5" opacity="0.2"/>
  <text x="72" y="472" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#928e8b">Survives campaign peaks</text>
  <rect x="280" y="336" width="224" height="160" rx="10" fill="#fafaf8" stroke="#e8e6e1"/>
  <text x="296" y="364" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Catalog freshness</text>
  <circle cx="320" cy="408" r="8" fill="#c8f542"/>
  <text x="336" y="412" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1a1a18">Live inventory sync</text>
  <circle cx="320" cy="440" r="8" fill="#2dd4bf"/>
  <text x="336" y="444" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1a1a18">No stale sale results</text>
  <text x="56" y="522" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
