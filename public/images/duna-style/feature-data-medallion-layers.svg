<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Medallion lake architecture layers</title>
  <desc id="desc">AiRAT diagram of bronze, silver, and gold medallion data lake layers with governed promotion paths.</desc>
