<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">SIEM correlated incident timeline</title>
  <desc id="desc">AiRAT diagram showing how endpoint, identity, and cloud signals converge on a single correlated incident timeline.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="56" y="72" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">SIEM and correlated timelines</text>
  <text x="56" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Signals converge before analysts open a ticket</text>
  <text x="280" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">incident</text>
  <rect x="268" y="140" width="24" height="20" rx="4" fill="#fafaf8" stroke="#1a1a18" stroke-width="1.5"/>
  <path d="M274 148h12M274 154h8" stroke="#1a1a18" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="280" y1="168" x2="280" y2="460" stroke="#898683" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="120" y="168" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#46838c">Endpoint</text>
  <rect x="248" y="180" width="64" height="64" fill="none" stroke="#898683" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="208" y="200" width="32" height="32" fill="#2dd4bf" opacity="0.35" stroke="#46838c"/>
  <text x="280" y="262" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">-12 min</text>
  <text x="120" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#1a1a18">Identity</text>
  <rect x="248" y="312" width="64" height="64" fill="none" stroke="#898683" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="264" y="328" width="32" height="32" fill="#c8f542" opacity="0.55" stroke="#1a1a18"/>
  <text x="280" y="394" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">0 min</text>
  <text x="120" y="432" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#46838c">Cloud</text>
  <rect x="248" y="444" width="64" height="64" fill="none" stroke="#898683" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="312" y1="476" x2="392" y2="476" stroke="#46838c" stroke-width="2"/>
  <rect x="392" y="460" width="32" height="32" fill="#2dd4bf" opacity="0.35" stroke="#46838c"/>
  <text x="360" y="510" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">+4 min</text>
  <text x="56" y="522" font-family="ui-monospace, monospace" font-size="10" fill="#b2afae">AiRAT &#183; illustrative</text>
</svg>
