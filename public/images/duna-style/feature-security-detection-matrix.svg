<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Detection engineering coverage matrix</title>
  <desc id="desc">AiRAT matrix of detection rule coverage across severity tiers and log sources.</desc>
  <rect width="560" height="560" fill="#f7f7f5"/>
  <rect x="24" y="24" width="512" height="512" fill="#fff" stroke="#e8e6e1"/>
  <text x="280" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a18">Detection engineering</text>
  <text x="280" y="104" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#898683">Severity / source coverage %</text>
