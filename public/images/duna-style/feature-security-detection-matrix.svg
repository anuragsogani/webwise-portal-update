  <text x="200" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">endpoint</text>
  <text x="280" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">identity</text>
  <text x="360" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#898683">cloud</text>
  <text x="120" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#46838c" transform="rotate(-90 120 300)">severity</text>
