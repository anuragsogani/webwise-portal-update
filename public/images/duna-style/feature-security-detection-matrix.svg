  <text x="148" y="308" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#46838c">medium</text>
  <text x="148" y="388" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#46838c">low</text>
  <rect x="176" y="200" width="64" height="48" fill="none" stroke="#1a1a18" stroke-width="2"/>
  <text x="208" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#1a1a18">94</text>
  <text x="248" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">72</text>
  <text x="328" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">68</text>
  <text x="208" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">81</text>
  <rect x="256" y="280" width="64" height="48" fill="none" stroke="#1a1a18" stroke-width="2"/>
  <text x="288" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#1a1a18">88</text>
  <text x="368" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">64</text>
  <text x="208" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">76</text>
  <text x="288" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#b2afae">70</text>
  <rect x="336" y="360" width="64" height="48" fill="none" stroke="#1a1a18" stroke-width="2"/>
