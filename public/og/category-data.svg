<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AiRAT Insights - Data and Search Engineering</title>
  <desc id="desc">Open Graph image for AiRAT's Data and Search Engineering category featuring an abstract medallion stack and descriptive category text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="950" cy="300" rx="320" ry="220" fill="#76e4df" opacity="0.05" filter="url(#blur)"/>

  <g stroke="#1e1e1e" stroke-width="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Medallion layers - abstract stack -->
  <g transform="translate(840, 130)" opacity="0.28">
    <!-- Bronze layer -->
    <ellipse cx="160" cy="240" rx="130" ry="28" fill="none" stroke="#76e4df" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="240" x2="30" y2="170" stroke="#76e4df" stroke-width="0.8" opacity="0.4"/>
    <line x1="290" y1="240" x2="290" y2="170" stroke="#76e4df" stroke-width="0.8" opacity="0.4"/>
    <ellipse cx="160" cy="170" rx="130" ry="28" fill="#0a0a0a" stroke="#76e4df" stroke-width="1" opacity="0.5"/>
    <!-- Silver layer -->
    <line x1="30" y1="170" x2="30" y2="100" stroke="#76e4df" stroke-width="0.8" opacity="0.5"/>
    <line x1="290" y1="170" x2="290" y2="100" stroke="#76e4df" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="160" cy="100" rx="130" ry="28" fill="#0a0a0a" stroke="#76e4df" stroke-width="1" opacity="0.6"/>
    <!-- Gold layer -->
    <line x1="30" y1="100" x2="30" y2="30" stroke="#76e4df" stroke-width="0.8" opacity="0.6"/>
    <line x1="290" y1="100" x2="290" y2="30" stroke="#76e4df" stroke-width="0.8" opacity="0.6"/>
    <ellipse cx="160" cy="30" rx="130" ry="28" fill="#0a0a0a" stroke="#76e4df" stroke-width="1.5" opacity="0.8"/>
    <text x="130" y="35" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.8">GOLD</text>
    <text x="122" y="105" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.6">SILVER</text>
    <text x="120" y="175" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.45">BRONZE</text>
  </g>

  <text x="80" y="192" font-family="monospace" font-size="13" fill="#76e4df" letter-spacing="4" opacity="0.9">AiRAT / INSIGHTS</text>
  <text x="80" y="275" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">Data &amp; Search</text>
  <text x="80" y="345" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">Engineering</text>
  <rect x="80" y="378" width="60" height="1.5" fill="#76e4df" opacity="0.8"/>
  <text x="80" y="432" font-family="system-ui, sans-serif" font-size="20" fill="#888">Medallion architecture, data contracts, and OpenSearch</text>
  <text x="80" y="460" font-family="system-ui, sans-serif" font-size="20" fill="#888">performance patterns at production scale.</text>
  <text x="80" y="575" font-family="monospace" font-size="13" fill="#444" letter-spacing="2">airat.in/blog/category/data</text>
</svg>
