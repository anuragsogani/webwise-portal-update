<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AiRAT Insights - AI and LLM Systems</title>
  <desc id="desc">Open Graph image for AiRAT's AI and LLM Systems category featuring an abstract neural network diagram and descriptive category text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="960" cy="180" rx="360" ry="240" fill="#76e4df" opacity="0.05" filter="url(#blur)"/>
  <ellipse cx="200" cy="500" rx="200" ry="140" fill="#76e4df" opacity="0.04" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#1e1e1e" stroke-width="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Neural net diagram - abstract -->
  <g transform="translate(820, 100)" opacity="0.22">
    <!-- Nodes -->
    <circle cx="40" cy="80" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="40" cy="160" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="40" cy="240" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="160" cy="60" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="160" cy="140" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="160" cy="220" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="160" cy="300" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="280" cy="120" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <circle cx="280" cy="220" r="10" fill="none" stroke="#76e4df" stroke-width="1.2"/>
    <!-- Connections -->
    <g stroke="#76e4df" stroke-width="0.7" fill="none">
      <line x1="50" y1="80" x2="150" y2="60"/>
      <line x1="50" y1="80" x2="150" y2="140"/>
      <line x1="50" y1="80" x2="150" y2="220"/>
      <line x1="50" y1="160" x2="150" y2="60"/>
      <line x1="50" y1="160" x2="150" y2="140"/>
      <line x1="50" y1="160" x2="150" y2="220"/>
      <line x1="50" y1="160" x2="150" y2="300"/>
      <line x1="50" y1="240" x2="150" y2="140"/>
      <line x1="50" y1="240" x2="150" y2="220"/>
      <line x1="50" y1="240" x2="150" y2="300"/>
      <line x1="170" y1="60" x2="270" y2="120"/>
      <line x1="170" y1="140" x2="270" y2="120"/>
      <line x1="170" y1="140" x2="270" y2="220"/>
      <line x1="170" y1="220" x2="270" y2="120"/>
      <line x1="170" y1="220" x2="270" y2="220"/>
      <line x1="170" y1="300" x2="270" y2="220"/>
    </g>
  </g>

  <text x="80" y="192" font-family="monospace" font-size="13" fill="#76e4df" letter-spacing="4" opacity="0.9">AiRAT / INSIGHTS</text>
  <text x="80" y="275" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">AI &amp; LLM Systems</text>
  <rect x="80" y="300" width="60" height="1.5" fill="#76e4df" opacity="0.8"/>
  <text x="80" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#888">RAG pipelines, governed LLMs, and AI evaluation patterns</text>
  <text x="80" y="388" font-family="system-ui, sans-serif" font-size="20" fill="#888">for production engineering teams.</text>
  <text x="80" y="575" font-family="monospace" font-size="13" fill="#444" letter-spacing="2">airat.in/blog/category/ai</text>
</svg>
