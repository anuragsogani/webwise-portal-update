<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AiRAT Insights - Security and SOC Engineering</title>
  <desc id="desc">Open Graph image for AiRAT's Security and SOC Engineering category featuring an abstract shield motif and descriptive category text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76e4df" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#76e4df" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="950" cy="200" rx="340" ry="220" fill="#76e4df" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#222" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Shield icon - abstract -->
  <g transform="translate(880, 180)">
    <path d="M100 0 L180 40 L180 120 C180 165 100 200 100 200 C100 200 20 165 20 120 L20 40 Z" fill="none" stroke="#76e4df" stroke-width="1.5" opacity="0.35"/>
    <path d="M100 30 L155 55 L155 115 C155 148 100 172 100 172 C100 172 45 148 45 115 L45 55 Z" fill="none" stroke="#76e4df" stroke-width="0.75" opacity="0.2"/>
    <circle cx="100" cy="105" r="22" fill="none" stroke="#76e4df" stroke-width="1" opacity="0.3"/>
    <path d="M89 105 L97 113 L111 97" stroke="#76e4df" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Category label -->
  <text x="80" y="192" font-family="monospace" font-size="13" fill="#76e4df" letter-spacing="4" opacity="0.9">AiRAT / INSIGHTS</text>

  <!-- Title -->
  <text x="80" y="275" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">Security &amp; SOC</text>
  <text x="80" y="345" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">Engineering</text>

  <!-- Lead line -->
  <rect x="80" y="380" width="60" height="1.5" fill="#76e4df" opacity="0.8"/>

  <!-- Descriptor -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="20" fill="#888" letter-spacing="0.2">Detection engineering, SIEM/XDR, and SOC automation</text>
  <text x="80" y="458" font-family="system-ui, sans-serif" font-size="20" fill="#888" letter-spacing="0.2">insights for production security teams.</text>

  <!-- Domain -->
  <text x="80" y="575" font-family="monospace" font-size="13" fill="#444" letter-spacing="2">airat.in/blog/category/security</text>
</svg>
