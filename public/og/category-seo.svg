<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AiRAT Insights - SEO and Visibility</title>
  <desc id="desc">Open Graph image for AiRAT's SEO and Visibility category featuring abstract search results UI bars and descriptive category text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="65"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="920" cy="220" rx="300" ry="200" fill="#76e4df" opacity="0.055" filter="url(#blur)"/>

  <g stroke="#1e1e1e" stroke-width="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- SERP-style abstract bars -->
  <g transform="translate(820, 140)" opacity="0.25">
    <!-- Search bar -->
    <rect x="0" y="0" width="310" height="38" rx="4" fill="none" stroke="#76e4df" stroke-width="1"/>
    <circle cx="290" cy="19" r="10" fill="none" stroke="#76e4df" stroke-width="1"/>
    <line x1="297" y1="26" x2="306" y2="35" stroke="#76e4df" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Result rows -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="80" height="8" rx="2" fill="#76e4df" opacity="0.5"/>
      <rect x="0" y="18" width="280" height="6" rx="2" fill="#444"/>
      <rect x="0" y="32" width="220" height="6" rx="2" fill="#333"/>
    </g>
    <g transform="translate(0, 130)">
      <rect x="0" y="0" width="60" height="8" rx="2" fill="#76e4df" opacity="0.35"/>
      <rect x="0" y="18" width="290" height="6" rx="2" fill="#333"/>
      <rect x="0" y="32" width="200" height="6" rx="2" fill="#2a2a2a"/>
    </g>
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="70" height="8" rx="2" fill="#76e4df" opacity="0.2"/>
      <rect x="0" y="18" width="260" height="6" rx="2" fill="#2a2a2a"/>
      <rect x="0" y="32" width="180" height="6" rx="2" fill="#222"/>
    </g>
    <!-- Rank label -->
    <text x="-30" y="75" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.6">#1</text>
    <text x="-30" y="145" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.4">#2</text>
    <text x="-30" y="215" font-family="monospace" font-size="11" fill="#76e4df" opacity="0.2">#3</text>
  </g>

  <text x="80" y="192" font-family="monospace" font-size="13" fill="#76e4df" letter-spacing="4" opacity="0.9">AiRAT / INSIGHTS</text>
  <text x="80" y="275" font-family="Georgia, serif" font-size="58" fill="#f5f5f5" font-weight="400" letter-spacing="-1">SEO &amp; Visibility</text>
  <rect x="80" y="300" width="60" height="1.5" fill="#76e4df" opacity="0.8"/>
  <text x="80" y="360" font-family="system-ui, sans-serif" font-size="20" fill="#888">GEO, AEO, entity SEO, and AI-era search strategy</text>
  <text x="80" y="388" font-family="system-ui, sans-serif" font-size="20" fill="#888">for product and engineering teams.</text>
  <text x="80" y="575" font-family="monospace" font-size="13" fill="#444" letter-spacing="2">airat.in/blog/category/seo</text>
</svg>
